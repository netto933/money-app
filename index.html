<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>支出管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.big{
font-size:28px;
font-weight:bold;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
font-size:16px;
}

button{
background:#2c7be5;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="card">
<p>今月の予算</p>
<div id="budget" class="big">¥50000</div>
<button onclick="changeBudget()">変更</button>
</div>

<div class="card">
<p>残り</p>
<div id="remain" class="big"></div>
</div>

<div class="card">

<p>商品名</p>
<input id="item">

<p>金額</p>
<input id="amount" type="number">

<p>カテゴリ</p>

<select id="category">

<option>食品</option>
<option>日用品</option>
<option>市販薬・サプリメント</option>
<option>医療費</option>
<option>本・参考書</option>
<option>趣味</option>
<option>お酒</option>
<option>その他</option>

</select>

<button onclick="addExpense()">記録</button>

</div>

<div class="card">

<p>今月カテゴリ別</p>
<canvas id="chart"></canvas>

</div>

<div class="card">

<p>履歴</p>
<div id="history"></div>

</div>

<script>

let budget = localStorage.getItem("budget") || 50000
document.getElementById("budget").innerText="¥"+budget

let expenses = JSON.parse(localStorage.getItem("expenses") || "[]")

let lastMonth = localStorage.getItem("month")

let nowMonth = new Date().getMonth()

if(lastMonth != nowMonth){

expenses=[]
localStorage.setItem("expenses",JSON.stringify(expenses))
localStorage.setItem("month",nowMonth)

}

function changeBudget(){

let newBudget = prompt("新しい予算")

if(newBudget){

budget = Number(newBudget)

localStorage.setItem("budget",budget)

document.getElementById("budget").innerText="¥"+budget

update()

}

}

function addExpense(){

let item=document.getElementById("item").value

let amount=Number(document.getElementById("amount").value)

let category=document.getElementById("category").value

if(!amount)return

expenses.push({

item:item,
amount:amount,
category:category

})

localStorage.setItem("expenses",JSON.stringify(expenses))

document.getElementById("item").value=""
document.getElementById("amount").value=""

update()

}

function update(){

let total=0

let historyHTML=""

let categoryTotal={}

expenses.forEach(e=>{

total+=e.amount

historyHTML+=e.category+" "+e.item+" ¥"+e.amount+"<br>"

if(!categoryTotal[e.category]){

categoryTotal[e.category]=0

}

categoryTotal[e.category]+=e.amount

})

document.getElementById("history").innerHTML=historyHTML

document.getElementById("remain").innerText="¥"+(budget-total)

drawChart(categoryTotal)

}

let chart

function drawChart(data){

let labels=Object.keys(data)

let values=Object.values(data)

if(chart)chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{

type:"pie",

data:{

labels:labels,

datasets:[{

data:values

}]

}

}

)

}

update()

</script>

</body>
</html>
