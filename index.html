<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>支出管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.big{
font-size:28px;
font-weight:bold;
}

.small{
color:blue;
font-size:14px;
}

input,select,button{

width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
font-size:16px;

}

button{

background:#2c7be5;
color:white;
border:none;
border-radius:8px;

}

.deleteBtn{

background:#e55353;
margin-top:5px;

}

</style>

</head>

<body>

<div class="card">

<p>今月の予算</p>

<div id="budget" class="big">¥50000</div>

<button onclick="changeBudget()">変更</button>

</div>

<div class="card">

<p>データ</p>

<button onclick="exportCSV()">CSVダウンロード</button>

<button onclick="exportJSON()">JSONバックアップ保存</button>

<input type="file" id="importFile">

<button onclick="importJSON()">JSON復元</button>

</div>

<p>商品名</p>
<input id="item">

<p>元の金額</p>
<input id="amount" type="number">

<p>値引き金額</p>
<input id="discountAmount" type="number">

<p>値引き率（%）</p>
<input id="discountPercent" type="number">

<p>カテゴリ</p>

<select id="category"></select>

<button onclick="addExpense()">記録</button>

</div>

<div class="card">

<p>カテゴリ別</p>

<canvas id="chart"></canvas>

</div>

<div class="card">

<p>履歴</p>

<div id="history"></div>

</div>

<div class="card">

<p>カテゴリ管理</p>

<div id="categoryList"></div>

<input id="newCategory" placeholder="新しいカテゴリ">

<button onclick="addCategory()">カテゴリ追加</button>

</div>

<div class="card">

<p>データ</p>

<button onclick="exportCSV()">CSVダウンロード</button>

</div>

<script>

let budget = localStorage.getItem("budget") || 50000
document.getElementById("budget").innerText="¥"+budget

let expenses = JSON.parse(localStorage.getItem("expenses") || "[]")

let categories = JSON.parse(localStorage.getItem("categories") || 
'["食品","日用品","市販薬・サプリメント","医療費","本・参考書","趣味","お酒","その他"]')

function saveCategories(){

localStorage.setItem("categories",JSON.stringify(categories))

renderCategories()

}

function renderCategories(){

let select=document.getElementById("category")
select.innerHTML=""

categories.forEach(c=>{

let option=document.createElement("option")
option.text=c
select.add(option)

})

let listHTML=""

categories.forEach((c,i)=>{

listHTML+=c+" <button class='deleteBtn' onclick='deleteCategory("+i+")'>削除</button><br>"

})

document.getElementById("categoryList").innerHTML=listHTML

}

function addCategory(){

let newCat=document.getElementById("newCategory").value

if(!newCat)return

categories.push(newCat)

document.getElementById("newCategory").value=""

saveCategories()

}

function deleteCategory(i){

if(confirm("削除してよろしいですか？")){

categories.splice(i,1)

saveCategories()

}

}

renderCategories()

let lastMonth = localStorage.getItem("month")
let nowMonth = new Date().getMonth()

if(lastMonth != nowMonth){

expenses=[]
localStorage.setItem("expenses",JSON.stringify(expenses))
localStorage.setItem("month",nowMonth)

}

function changeBudget(){

let newBudget = prompt("新しい予算")

if(newBudget){

budget = Number(newBudget)

localStorage.setItem("budget",budget)

document.getElementById("budget").innerText="¥"+budget

update()

}

}

function addExpense(){

let item=document.getElementById("item").value

let amount=Number(document.getElementById("amount").value)

let discountAmount=Number(document.getElementById("discountAmount").value)

let discountPercent=Number(document.getElementById("discountPercent").value)

let category=document.getElementById("category").value

if(!amount)return

let finalAmount=amount

if(discountPercent){

finalAmount = amount - (amount*discountPercent/100)

}

if(discountAmount){

finalAmount = amount - discountAmount

}

expenses.push({

item:item,
amount:amount,
final:Math.round(finalAmount),
category:category,
date:new Date().toLocaleDateString()

})

localStorage.setItem("expenses",JSON.stringify(expenses))

document.getElementById("item").value=""
document.getElementById("amount").value=""
document.getElementById("discountAmount").value=""
document.getElementById("discountPercent").value=""

update()

}

function deleteExpense(i){

if(confirm("削除してよろしいですか？")){

expenses.splice(i,1)

localStorage.setItem("expenses",JSON.stringify(expenses))

update()

}

}

function update(){

let total=0
let totalOriginal=0

let historyHTML=""

let categoryTotal={}

expenses.forEach((e,i)=>{

total+=e.final
totalOriginal+=e.amount

historyHTML+=e.date+" "+e.category+" "+e.item+" ¥"+e.final

if(e.final!=e.amount){

historyHTML+=" (元¥"+e.amount+")"

}

historyHTML+="<br><button class='deleteBtn' onclick='deleteExpense("+i+")'>削除</button><br><br>"

if(!categoryTotal[e.category]){

categoryTotal[e.category]=0

}

categoryTotal[e.category]+=e.final

})

document.getElementById("history").innerHTML=historyHTML

document.getElementById("remain").innerText="¥"+(budget-total)

document.getElementById("remainOriginal").innerText="（値引き無しの場合：¥"+(budget-totalOriginal)+"）"

drawChart(categoryTotal)

}

function exportCSV(){

let csv="日付,カテゴリ,商品名,元値,支払額\n"

expenses.forEach(e=>{

csv+=`${e.date},${e.category},${e.item},${e.amount},${e.final}\n`

})

let blob=new Blob([csv],{type:"text/csv"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="money_export.csv"

link.click()

}

let chart

function drawChart(data){

let labels=Object.keys(data)
let values=Object.values(data)

if(chart)chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{

type:"pie",

data:{

labels:labels,

datasets:[{

data:values

}]

}

}

)

}

update()
function exportJSON(){

let data={

budget:budget,
expenses:expenses,
categories:categories

}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="money_backup.json"

link.click()

}

function importJSON(){

let file=document.getElementById("importFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

budget=data.budget
expenses=data.expenses
categories=data.categories

localStorage.setItem("budget",budget)
localStorage.setItem("expenses",JSON.stringify(expenses))
localStorage.setItem("categories",JSON.stringify(categories))

renderCategories()
update()

}

reader.readAsText(file)

}
</script>

</body>

</html>
