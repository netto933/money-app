<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Money</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box;}

body{
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.big{
font-size:30px;
font-weight:bold;
}

.small{
color:#3a7afe;
font-size:13px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#3a7afe;
color:white;
border:none;
}

.deleteBtn{
background:#ff4d4d;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="app">

<div class="card">

<p>今月の予算</p>

<div id="budget" class="big">未設定</div>

<button onclick="changeBudget()">予算設定</button>

</div>

<div class="card">

<p>残り</p>

<div id="remain" class="big">¥0</div>

</div>

<div class="card">

<p>使った金額</p>
<input id="amount" type="number">

<p>カテゴリ</p>
<select id="category"></select>

<p>商品名</p>
<input id="item">

<button id="discountBtn" onclick="toggleDiscount()">＋値引き</button>

<div id="discountArea" class="hidden">

<p>値引き金額</p>
<input id="discountAmount" type="number">

<p>値引き率</p>
<input id="discountPercent" type="number">

</div>

<button onclick="addExpense()">記録</button>

</div>

<div class="card">

<p>カテゴリ別</p>

<canvas id="chart"></canvas>

</div>

<div class="card">

<button id="historyBtn" onclick="toggleHistory()">＋履歴</button>

<div id="historyArea" class="hidden">

<div id="history"></div>

</div>

</div>

<div class="card">

<button id="categoryBtn" onclick="toggleCategoryManager()">＋カテゴリ管理</button>

<div id="categoryManager" class="hidden">

<div id="categoryList"></div>

<input id="newCategory" placeholder="新しいカテゴリ">

<button onclick="addCategory()">カテゴリ追加</button>

</div>

</div>

<div class="card">

<p>データ</p>

<button onclick="exportJSON()">JSONバックアップ</button>

<input type="file" id="importFile">

<button onclick="importJSON()">JSON復元</button>

</div>

</div>

<script>

let budget=localStorage.getItem("money_app_budget")
let expenses=JSON.parse(localStorage.getItem("money_app_expenses")||"[]")
let categories=JSON.parse(localStorage.getItem("money_app_categories")||"[]")

if(budget){
document.getElementById("budget").innerText="¥"+budget
}

function toggleDiscount(){

let area=document.getElementById("discountArea")
let btn=document.getElementById("discountBtn")

area.classList.toggle("hidden")

btn.innerText=area.classList.contains("hidden")?"＋値引き":"－値引き"

}

function toggleHistory(){

let area=document.getElementById("historyArea")
let btn=document.getElementById("historyBtn")

area.classList.toggle("hidden")

btn.innerText=area.classList.contains("hidden")?"＋履歴":"－履歴"

}

function toggleCategoryManager(){

let area=document.getElementById("categoryManager")
let btn=document.getElementById("categoryBtn")

area.classList.toggle("hidden")

btn.innerText=area.classList.contains("hidden")?"＋カテゴリ管理":"－カテゴリ管理"

}

function changeBudget(){

let newBudget=prompt("予算入力")

if(newBudget){

budget=Number(newBudget)

localStorage.setItem("money_app_budget",budget)

document.getElementById("budget").innerText="¥"+budget

update()

}

}

function renderCategories(){

let select=document.getElementById("category")

select.innerHTML=""

categories.forEach(c=>{

let option=document.createElement("option")
option.text=c
select.add(option)

})

let html=""

categories.forEach((c,i)=>{

html+=c+" <button class='deleteBtn' onclick='deleteCategory("+i+")'>削除</button><br>"

})

document.getElementById("categoryList").innerHTML=html

}

function addCategory(){

let newCat=document.getElementById("newCategory").value

if(!newCat)return

categories.push(newCat)

localStorage.setItem("money_app_categories",JSON.stringify(categories))

document.getElementById("newCategory").value=""

renderCategories()

}

function deleteCategory(i){

categories.splice(i,1)

localStorage.setItem("money_app_categories",JSON.stringify(categories))

renderCategories()

}

function addExpense(){

let amount=Number(document.getElementById("amount").value)
let discountAmount=Number(document.getElementById("discountAmount").value)
let discountPercent=Number(document.getElementById("discountPercent").value)
let category=document.getElementById("category").value
let item=document.getElementById("item").value

if(!amount)return

let final=amount

if(discountPercent){
final=amount-(amount*discountPercent/100)
}

if(discountAmount){
final=amount-discountAmount
}

expenses.push({
amount:amount,
final:Math.round(final),
category:category,
item:item,
date:new Date().toLocaleDateString()
})

localStorage.setItem("money_app_expenses",JSON.stringify(expenses))

document.getElementById("amount").value=""
document.getElementById("item").value=""
document.getElementById("discountAmount").value=""
document.getElementById("discountPercent").value=""

update()

}

function deleteExpense(i){

expenses.splice(i,1)

localStorage.setItem("money_app_expenses",JSON.stringify(expenses))

update()

}

function update(){

let total=0
let html=""
let catTotal={}

let sorted=[...expenses].reverse()

sorted.forEach((e,i)=>{

total+=e.final

html+=e.date+" "+e.category+" "+e.item+" ¥"+e.final
html+="<br><button class='deleteBtn' onclick='deleteExpense("+(expenses.length-1-i)+")'>削除</button><br><br>"

if(!catTotal[e.category]){
catTotal[e.category]=0
}

catTotal[e.category]+=e.final

})

document.getElementById("history").innerHTML=html

if(budget){
document.getElementById("remain").innerText="¥"+(budget-total)
}

drawChart(catTotal)

}

function drawChart(data){

let labels=Object.keys(data)
let values=Object.values(data)

let colors=labels.map((_,i)=>`hsl(${i*60},70%,60%)`)

if(window.chart){
chart.destroy()
}

window.chart=new Chart(
document.getElementById("chart"),
{
type:"pie",
data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:colors
}]
}
}
)

}

function exportJSON(){

let data={budget,expenses,categories}

let blob=new Blob([JSON.stringify(data)])

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="money_app_backup.json"

link.click()

}

function importJSON(){

let file=document.getElementById("importFile").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

budget=data.budget
expenses=data.expenses
categories=data.categories

localStorage.setItem("money_app_budget",budget)
localStorage.setItem("money_app_expenses",JSON.stringify(expenses))
localStorage.setItem("money_app_categories",JSON.stringify(categories))

document.getElementById("budget").innerText="¥"+budget

renderCategories()
update()

}

reader.readAsText(file)

}

renderCategories()
update()

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
