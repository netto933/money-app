<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>支出管理</title>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px auto;
border-radius:12px;
max-width:400px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.big{
font-size:34px;
font-weight:bold;
}

button,input,select{
font-size:16px;
padding:10px;
margin:5px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
}

.warning{
color:red;
font-weight:bold;
}

.safe{
color:green;
font-weight:bold;
}

.list{
text-align:left;
}

</style>
</head>

<body>

<h2>支出管理</h2>

<div class="card">

<p>今月の予算</p>
<div id="budget" class="big"></div>

<button onclick="changeBudget()">予算変更</button>

</div>

<div class="card">

<p>残り</p>
<div id="remain" class="big"></div>

</div>

<div class="card">

<h3>支出を追加</h3>

<input id="amount" type="number" placeholder="金額">

<select id="category">
<option>食費</option>
<option>日用品</option>
<option>趣味</option>
<option>その他</option>
</select>

<button onclick="addExpense()">追加</button>

</div>

<div class="card">

<h3>履歴（最近30件）</h3>

<div id="history" class="list"></div>

</div>

<div class="card">

<h3>買う前チェック</h3>

<input id="checkAmount" type="number" placeholder="買おうとしている金額">

<button onclick="checkBuy()">判定</button>

<p id="result"></p>

</div>

<script>

let budget = Number(localStorage.getItem("budget")) || 50000

let expenses = JSON.parse(localStorage.getItem("expenses") || "[]")

let currentMonth = new Date().getMonth()

let savedMonth = Number(localStorage.getItem("month"))

if(savedMonth !== currentMonth){

expenses = []

localStorage.setItem("expenses",JSON.stringify(expenses))

localStorage.setItem("month",currentMonth)

}

function update(){

let spent = expenses.reduce((a,b)=>a+b.amount,0)

let remain = budget - spent

document.getElementById("budget").innerText="¥"+budget
document.getElementById("remain").innerText="¥"+remain

updateHistory()

}

function addExpense(){

let amount = Number(document.getElementById("amount").value)
let category = document.getElementById("category").value

if(!amount) return

expenses.unshift({amount,category})

if(expenses.length>30){
expenses.pop()
}

localStorage.setItem("expenses",JSON.stringify(expenses))

document.getElementById("amount").value=""

update()

}

function updateHistory(){

let history = document.getElementById("history")

history.innerHTML=""

expenses.forEach(e=>{

let div = document.createElement("div")

div.innerText = e.category+" ¥"+e.amount

history.appendChild(div)

})

}

function changeBudget(){

let newBudget = prompt("新しい月予算を入力")

if(!newBudget) return

budget = Number(newBudget)

localStorage.setItem("budget",budget)

update()

}

function checkBuy(){

let price = Number(document.getElementById("checkAmount").value)

let spent = expenses.reduce((a,b)=>a+b.amount,0)

let remain = budget - spent

let result = document.getElementById("result")

if(price > remain){

result.innerHTML="⚠ 予算オーバー"
result.className="warning"

return
}

let percent = (price/remain)*100

if(percent > 30){

result.innerHTML="⚠ 残りの"+Math.round(percent)+"%を使います"
result.className="warning"

}else{

result.innerHTML="OK 範囲内"
result.className="safe"

}

}

update()

</script>

</body>
</html>
